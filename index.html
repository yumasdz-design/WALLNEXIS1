    <style>
        :root {
            --accent: #00f2ff;
            --bg: #08090d;
            --card-bg: rgba(255, 255, 255, 0.03);
            --text: #ffffff;
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        /* --- HEADER --- */
        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(8, 9, 13, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1.5rem;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.2rem;
        }

        .logo {
            font-size: 2rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .logo span { color: var(--accent); text-shadow: 0 0 20px rgba(0, 242, 255, 0.4); }

        .search-box {
            position: relative;
            width: 100%;
            max-width: 500px;
        }

        .search-box input {
            width: 100%;
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 20px 12px 45px;
            border-radius: 50px;
            color: white;
            outline: none;
            transition: var(--transition);
        }

        .search-box i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--accent); }

        .filters { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

        .filter-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            color: #888;
            padding: 8px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }

        .filter-btn.active, .filter-btn:hover {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
        }

        /* --- GALLERY --- */
        .gallery {
            max-width: 1600px;
            margin: 2rem auto;
            padding: 0 1rem;
            columns: 4 300px;
            column-gap: 20px;
        }

        .wall-card {
            break-inside: avoid;
            margin-bottom: 20px;
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            background: var(--card-bg);
            transition: var(--transition);
            cursor: pointer;
        }

        .wall-card:hover { transform: translateY(-10px); }

        .wall-card img {
            width: 100%;
            display: block;
            transition: 0.5s;
        }

        .wall-card:hover img { filter: brightness(0.6) scale(1.05); }

        .overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            opacity: 0;
            transition: 0.3s;
        }

        .wall-card:hover .overlay { opacity: 1; }

        /* --- MODAL --- */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-box {
            max-width: 90%;
            text-align: center;
        }

        .modal-box img {
            max-width: 100%;
            max-height: 80vh;
            border-radius: 10px;
            box-shadow: 0 0 40px rgba(0,242,255,0.2);
        }

        .dl-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--accent);
            color: #000;
            padding: 15px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 800;
            margin-top: 20px;
            transition: 0.3s;
        }

        .close-modal {
            position: absolute;
            top: 30px;
            right: 30px;
            font-size: 2rem;
            cursor: pointer;
        }

        @media (max-width: 768px) { .gallery { columns: 2; } }
    </style>

    const grid = document.getElementById('grid');

    function loadWallpapers(items) {
        grid.innerHTML = items.map(w => `
            <div class="wall-card" onclick="openM('${w.path}')">
                <img src="${w.path}" alt="${w.name}" loading="lazy">
                <div class="overlay">
                    <span style="font-weight:800">${w.name}</span>
                    <span style="font-size:0.8rem; color:var(--accent)">Cliquez pour agrandir</span>
                </div>
            </div>
        `).join('');
    }

    // Filtres
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            document.querySelector('.filter-btn.active').classList.remove('active');
            e.target.classList.add('active');
            const cat = e.target.dataset.cat;
            loadWallpapers(cat === 'all' ? myWallpapers : myWallpapers.filter(w => w.cat === cat));
        });
    });

    // Recherche
    search.addEventListener('input', (e) => {
        const val = e.target.value.toLowerCase();
        loadWallpapers(myWallpapers.filter(w => w.name.toLowerCase().includes(val)));
    });

    // Modal
    function openM(path) {
        document.getElementById('mImg').src = path;
        document.getElementById('mLink').href = path;
        document.getElementById('modal').style.display = 'flex';
    }

    function closeM() { document.getElementById('modal').style.display = 'none'; }
